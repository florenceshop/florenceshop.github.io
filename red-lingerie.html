<!DOCTYPE html>
<html>
<head>
  <title>Red Lingerie</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      padding: 20px;
      background: #f5f5f5;
    }

    .container {
      display: flex;
      gap: 30px;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    .left {
      width: 40%;
    }

    .right {
      width: 60%;
    }

    .main-img {
      width: 100%;
      border-radius: 10px;
    }

    .thumbs {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .thumbs img {
      width: 70px;
      cursor: pointer;
      border-radius: 5px;
      border: 2px solid transparent;
    }

    .thumbs img:hover {
      border: 2px solid orange;
    }

    .title {
      font-size: 24px;
      font-weight: bold;
    }

    .price {
      font-size: 22px;
      color: orange;
      margin: 10px 0;
    }

    .btn {
      padding: 15px 25px;
      background: orange;
      color: white;
      border: none;
      font-size: 18px;
      cursor: pointer;
      border-radius: 5px;
    }

    .btn:hover {
      background: darkorange;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- LEFT SIDE -->
  <div class="left">
    <img id="mainImage" src="img1.jpg" class="main-img">

    <div class="thumbs">
      <img src="images/redbra11.jpeg" onclick="changeImage(this)">
      <img src="images/redbra2.jpeg" onclick="changeImage(this)">
      <img src="images/redbra3.jpeg" onclick="changeImage(this)">
    </div>
  </div>

  <!-- RIGHT SIDE -->
  <div class="right">
    <div class="title">Red Lingerie Set</div>

    <div class="price">৳1200</div>

    <p>Comfortable, stylish and premium quality lingerie.</p>

    <button class="btn" onclick="orderNow()">Order Now</button>
  </div>

</div>

<script>
  function changeImage(element) {
    document.getElementById("mainImage").src = element.src;
  }

  function orderNow() {
    window.open("https://wa.me/880YOURNUMBER?text=I want to order Red Lingerie");
  }
</script>

</body>
</html>
