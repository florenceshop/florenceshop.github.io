<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Red Lingerie</title>
  
  <!-- CSS for gallery and buttons -->
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f5f5f5;
      padding: 20px;
    }

    h1 {
      color: #d10000;
      margin-bottom: 10px;
    }

    .product-gallery {
      margin: 20px 0;
    }

    .big-image {
      width: 300px;
      height: auto;
      border: 1px solid #ccc;
      margin-bottom: 10px;
    }

    .thumbnails img {
      width: 60px;
      height: auto;
      margin: 5px;
      cursor: pointer;
      border: 1px solid #ccc;
      transition: transform 0.2s;
    }

    .thumbnails img:hover {
      transform: scale(1.1);
      border-color: black;
    }

    .buttons {
      margin-top: 20px;
    }

    .buttons button {
      background-color: #d10000;
      color: white;
      border: none;
      padding: 10px 20px;
      margin: 5px;
      cursor: pointer;
      font-size: 16px;
      transition: background 0.2s;
    }

    .buttons button:hover {
      background-color: #a30000;
    }

    .description {
      max-width: 400px;
      margin: 10px auto 20px auto;
      font-size: 16px;
      color: #333;
    }
  </style>
</head>
<body>

  <h1>Red Lingerie</h1>
  <p class="description">Elegant and comfortable red lingerie set. Available in multiple sizes. Perfect for special occasions or everyday confidence.</p>

  <!-- Product Gallery -->
  <div class="product-gallery">
    <!-- Main big image -->
    <img id="main-image" src="images/redbra1.jpeg" alt="Red Lingerie" class="big-image">

    <!-- Thumbnails -->
    <div class="thumbnails">
      <img src="images/redbra1.jpeg" alt="Red Lingerie 1" onclick="changeImage(this)">
      <img src="images/redbra2.jpeg" alt="Red Lingerie 2" onclick="changeImage(this)">
      <img src="images/redbra3.jpeg" alt="Red Lingerie 3" onclick="changeImage(this)">
      <img src="images/redbra4.jpeg" alt="Red Lingerie 4" onclick="changeImage(this)">
      <img src="images/redbra5.jpeg" alt="Red Lingerie 5" onclick="changeImage(this)">
      <img src="images/redbra6.jpeg" alt="Red Lingerie 6" onclick="changeImage(this)">
    </div>
  </div>

  <!-- Add to Cart / Checkout -->
  <div class="buttons">
    <button>Add to Cart</button>
    <button>Checkout</button>
  </div>

  <!-- JS to change main image when thumbnail clicked -->
  <script>
    function changeImage(element) {
      document.getElementById('main-image').src = element.src;
    }
  </script>

</body>
</html>
