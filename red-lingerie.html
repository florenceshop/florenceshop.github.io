<!DOCTYPE html>
<html>
<head>
  <title>Red Lingerie Set</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; text-align: center; background: #f5f5f5; }
    h1 { background: black; color: white; padding: 15px; }
    .big-image { width: 80%; max-width: 400px; margin: 20px auto; border-radius: 10px; }
    .thumbnails { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; }
    .thumbnails img { width: 60px; height: 60px; border-radius: 5px; cursor: pointer; }
    button { padding: 10px 15px; background: black; color: white; border: none; border-radius: 5px; margin: 10px; }
    .description { max-width: 400px; margin: 10px auto; text-align: left; background: white; padding: 10px; border-radius: 8px; }
  </style>
</head>
<body>

<h1>Red Lingerie Set</h1>

<!-- Main big image -->
<img id="mainImage" src="image1.jpg" class="big-image">

<!-- Thumbnails -->
<div class="thumbnails" id="thumbContainer">
  <img src="image2.jpg" onclick="swapImage(this)">
  <img src="image3.jpg" onclick="swapImage(this)">
  <img src="image4.jpg" onclick="swapImage(this)">
</div>

<!-- Product Description -->
<div class="description">
  <p><strong>Elegant red lingerie set</strong> with lace details. Comfortable, stylish, and perfect for gifting.</p>
  <p>Price: ৳1200</p>
</div>

<!-- Add to Cart -->
<button onclick="addToCart('Red Lingerie Set', 1200)">Add to Cart</button>

<!-- Back to Homepage -->
<a href="index.html">⬅ Back to Shop</a>

<script>
let mainImage = document.getElementById('mainImage');
let thumbContainer = document.getElementById('thumbContainer');

// Swap clicked thumbnail with big image
function swapImage(clickedThumb){
  let currentBig = mainImage.src;
  mainImage.src = clickedThumb.src;
  clickedThumb.src = currentBig;
}

// Add product to cart
function addToCart(name, price){
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  cart.push({name, price});
  localStorage.setItem("cart", JSON.stringify(cart));
  alert(name + " added to cart!");
}
</script>

</body>
</html>
