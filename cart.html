<!DOCTYPE html>
<html>
<head>
  <title>Your Cart</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; background: #f5f5f5; text-align: center; }
    h1 { background: black; color: white; padding: 15px; }
    .cart-item { background: white; margin: 15px; padding: 10px; border-radius: 8px; }
    button { padding: 8px 12px; background: black; color: white; border: none; border-radius: 5px; }
    a { display: inline-block; margin-top: 20px; color: blue; }
  </style>
</head>
<body>

<h1>Your Cart 🛒</h1>
<div id="cart"></div>

<a href="index.html">⬅ Back to Shop</a><br>
<a href="checkout.html">Proceed to Checkout ✅</a>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function displayCart() {
  let container = document.getElementById("cart");
  container.innerHTML = "";

  if(cart.length === 0) {
    container.innerHTML = "<p>Your cart is empty 😔</p>";
  }

  cart.forEach((item, index) => {
    container.innerHTML += `
      <div class="cart-item">
        <p>${item.name} - ৳${item.price}</p>
        <button onclick="removeFromCart(${index})">Remove</button>
      </div>
    `;
  });
}

function removeFromCart(index) {
  cart.splice(index, 1);
  localStorage.setItem("cart", JSON.stringify(cart));
  displayCart();
}

displayCart();
</script>

</body>
</html>
